# PGIAgent 智能体配置
# 只包含Agent行为相关的配置，不包含工具配置（工具配置由工具节点自行管理）

# Agent行为配置
agent:
  name: "PowerGridInspectionAgent"
  description: "电网巡检机器小车智能体"
  
  # 模型配置
  llm_provider: "deepseek"  # deepseek, qwen, local, mock
  llm_model: "deepseek-chat"
  llm_temperature: 0.7
  llm_max_tokens: 2000
  
  # 执行配置
  max_iterations: 20  # 最大迭代次数
  use_reflection: true  # 是否使用反思机制
  reflection_interval: 3  # 每N步反思一次
  
  # 安全配置
  max_velocity: 0.5  # 最大线速度 (m/s)
  min_obstacle_distance: 0.3  # 最小障碍物距离 (m)
  
  # 执行模式
  ros_enabled: true  # 是否启用ROS模式
  stream_output: true  # 是否流式输出


# 预留：可以在这里添加多个环境配置
# 例如: development, production, simulation
environments:
  development:
    llm_provider: "local"
    llm_model: "qwen2.5:7b"
    
  production:
    llm_provider: "deepseek"
    llm_model: "deepseek-chat"
    
  simulation:
    llm_provider: "mock"
    ros_enabled: false
